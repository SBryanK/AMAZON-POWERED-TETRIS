version: "4.0"

services:
  tetris-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: tetris-backend
    ports:
      - "8000:8000"
    networks:
      - tetris-net
    environment:
      TZ: "UTC"
      CORS_ORIGINS: "http://localhost:8080,http://localhost:5173,http://localhost:3000"
      DB_PATH: "/data/scores.db"
    volumes:
      - tetris-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  tetris-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: tetris-frontend
    ports:
      - "8080:80"
    networks:
      - tetris-net
    depends_on:
      tetris-backend:
        condition: service_healthy
    environment:
      TZ: "UTC"

networks:
  tetris-net:
    driver: bridge

volumes:
  tetris-data:
    driver: local
